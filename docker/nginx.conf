# NOTE: This file is used as an envsubst template.
# In docker-compose.yml it is mounted to /etc/nginx/templates/default.conf.template
# so that the nginx docker image expands ${DOMAIN} at startup.
# Nginx-native variables ($host, $http_upgrade, etc.) are escaped as ${dollar}
# to prevent envsubst from clobbering them.

server {
    listen 80;
    server_name _;

    # ACME challenge for Let's Encrypt certificate renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP to HTTPS
    location / {
        return 301 https://${dollar}host${dollar}request_uri;
    }
}

server {
    listen 443 ssl;
    server_name ${DOMAIN};

    # TLS certificates managed by certbot
    ssl_certificate     /etc/letsencrypt/live/${DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${DOMAIN}/privkey.pem;

    # Modern TLS settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS (63072000 seconds = 2 years)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy no-referrer always;

    # Security: hide Nginx version
    server_tokens off;

    # Max upload size (matches API multipart limit)
    client_max_body_size 50M;

    # --- API routes ---
    location /api/ {
        proxy_pass         http://api:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade ${dollar}http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host ${dollar}host;
        proxy_set_header   X-Real-IP ${dollar}remote_addr;
        proxy_set_header   X-Forwarded-For ${dollar}proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto ${dollar}scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # WebSocket terminal / live endpoints
    location /api/ws/ {
        proxy_pass         http://api:3001/api/ws/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade ${dollar}http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host ${dollar}host;
        proxy_set_header   X-Real-IP ${dollar}remote_addr;
        proxy_set_header   X-Forwarded-For ${dollar}proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto ${dollar}scheme;
        proxy_read_timeout 3600s;
    }

    # WebSocket terminal direct path
    location /terminal/ {
        proxy_pass         http://api:3001/terminal/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade ${dollar}http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host ${dollar}host;
        proxy_set_header   X-Real-IP ${dollar}remote_addr;
        proxy_set_header   X-Forwarded-For ${dollar}proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto ${dollar}scheme;
        proxy_read_timeout 3600s;
    }

    # Health probes (no rewrite needed)
    location ~ ^/(health|live|liveness|ready|readiness)${dollar} {
        proxy_pass       http://api:3001;
        proxy_set_header Host ${dollar}host;
        proxy_set_header X-Real-IP ${dollar}remote_addr;
    }

    # --- Frontend (Next.js) ---
    location / {
        proxy_pass         http://web:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade ${dollar}http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host ${dollar}host;
        proxy_set_header   X-Real-IP ${dollar}remote_addr;
        proxy_set_header   X-Forwarded-For ${dollar}proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto ${dollar}scheme;
        proxy_read_timeout 60s;
    }
}
