name: deployforge

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - deployforge_internal
      - deployforge_dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1", "--requirepass", "${REDIS_PASSWORD:-deployforge_redis_pass_123}"]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-deployforge_redis_pass_123}
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6380}:6379"
    networks:
      - deployforge_internal
      - deployforge_dev
    healthcheck:
      # L-4: Use REDISCLI_AUTH env var — avoids password appearing in `ps aux`
      test: ["CMD-SHELL", "REDISCLI_AUTH=$$REDIS_PASSWORD redis-cli ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3001}
      APP_URL: ${APP_URL:?APP_URL is required}
      API_URL: ${API_URL:?API_URL is required}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      REDIS_ENABLED: ${REDIS_ENABLED:-true}
      REDIS_URL: redis://:${REDIS_PASSWORD:-deployforge_redis_pass_123}@redis:6379
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      ADMIN_SECRET: ${ADMIN_SECRET:?ADMIN_SECRET is required}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET:?ADMIN_JWT_SECRET is required}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?ENCRYPTION_KEY is required}
      MASTER_KEY: ${MASTER_KEY:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:?GITHUB_CLIENT_ID is required}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:?GITHUB_CLIENT_SECRET is required}
      GITHUB_CALLBACK_URL: ${GITHUB_CALLBACK_URL:?GITHUB_CALLBACK_URL is required}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:?GITHUB_WEBHOOK_SECRET is required}
      GOOGLE_OAUTH_ENABLED: ${GOOGLE_OAUTH_ENABLED:-true}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-}
      SMTP_HOST: ${SMTP_HOST:?SMTP_HOST is required}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:?SMTP_USER is required}
      SMTP_PASS: ${SMTP_PASS:?SMTP_PASS is required}
      SMTP_FROM: ${SMTP_FROM:-}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-100}
      RATE_LIMIT_WINDOW: ${RATE_LIMIT_WINDOW:-1 minute}
      ADMIN_MAX_ATTEMPTS: ${ADMIN_MAX_ATTEMPTS:-5}
      ADMIN_LOCKOUT_TIME: ${ADMIN_LOCKOUT_TIME:-900}
    ports:
      # In production Nginx handles external traffic. Remove this for production.
      - "${API_PORT:-3001}:${PORT:-3001}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:' + (process.env.PORT || 3001) + '/live').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    networks:
      - deployforge_internal
      - deployforge_proxy   # reachable by nginx only, not the public host
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      # M-3: Named volume for backups — container fs is read_only, /app/backups must be a writable mount
      - backup_data:/app/backups

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-${API_URL:-http://localhost:3001}}
    restart: unless-stopped
    environment:
      # Explicitly set PORT=3000 — MUST come before env_file to override any PORT from .env
      PORT: "3000"
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-${API_URL:-http://localhost:3001}}
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      # In production Nginx handles public ports. Keep local dev port for convenience.
      # Remove or comment this out when running behind Nginx in production.
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    networks:
      - deployforge_proxy   # reachable by nginx only
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
      - /tmp/.next

  # H-3: Nginx reverse proxy — TLS termination for production.
  # Set DOMAIN to your real domain (e.g. deployforge.example.com).
  # Certbot auto-renews Let's Encrypt certificates.
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      # 'dollar' is used inside the nginx template to escape Nginx-native variables
      # so envsubst only expands ${DOMAIN} and leaves $host, $scheme, etc. intact.
      dollar: "$$"
      DOMAIN: ${DOMAIN:-localhost}
    volumes:
      - ./docker/nginx.conf:/etc/nginx/templates/default.conf.template:ro
      - certbot_webroot:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    networks:
      - deployforge_proxy
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    profiles:
      - production   # only starts with: docker compose --profile production up

  certbot:
    image: certbot/certbot:v3.0.1
    restart: "no"
    volumes:
      - certbot_webroot:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    # Run manually to issue cert: docker compose run --rm certbot
    # Then reload nginx:           docker compose exec nginx nginx -s reload
    command: >
      certonly --webroot
      --webroot-path=/var/www/certbot
      --email ${CERTBOT_EMAIL:-admin@example.com}
      --agree-tos
      --no-eff-email
      -d ${DOMAIN:-example.com}
    profiles:
      - production

networks:
  deployforge_internal:
    internal: true
  deployforge_proxy:    # nginx <-> api/web (not host-exposed)
  deployforge_public:   # legacy dev alias (kept for backward compat)
  deployforge_dev:
    # Non-internal network for host access to postgres/redis in local dev.
    # Port bindings on internal networks are blocked by Docker.

volumes:
  postgres_data:
  redis_data:
  backup_data:            # M-3: API backup files (read_only container needs writable mount)
  certbot_webroot:        # H-3: ACME challenge files
  certbot_certs:          # H-3: Let's Encrypt certificates
